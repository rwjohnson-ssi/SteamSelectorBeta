<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="description" content="Browse SteamSelector Beta product categories." />
  <title>Product Category | SteamSelector Beta</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="catalog-layout.css" />
  <link rel="stylesheet" href="quantity-stepper.css?v=qty-stepper-1" />
  <link rel="stylesheet" href="quick-view-mobile.css?v=mobile-sheet-1" />
  <link rel="stylesheet" href="catalog-results-design.css?v=results-layout-1" />
  <link rel="stylesheet" href="catalog-results-mobile-table.css?v=results-table-compact-1" />
  <link rel="stylesheet" href="catalog-view-state.css?v=view-state-1" />
  <link rel="stylesheet" href="catalog-filter-panel.css?v=filter-panel-1" />
  <link rel="stylesheet" href="catalog-sort-direction.css?v=sort-direction-1" />
  <link rel="stylesheet" href="catalog-results-controls.css?v=controls-2" />
  <link rel="stylesheet" href="catalog-header-clean.css?v=header-contract-2" />
  <link rel="stylesheet" href="quick-view-redesign.css?v=quick-view-approved-2" />
  <link rel="stylesheet" href="quick-view-mobile-footer-fix.css?v=quick-view-footer-3" />
  <style>
    .catalog-page .quick-view-project-section {
      padding-top: 22px;
    }

    .catalog-page .quick-view-project-section[hidden] {
      display: none;
    }

    .catalog-page .quick-view-actions .quick-view-project-toggle {
      margin: 0;
    }

    .catalog-page .quick-view-project-panel {
      display: grid;
      gap: 12px;
      padding: 14px;
      background: #f8fafb;
      border: 1px solid #dfe4e8;
      border-radius: 10px;
    }

    .catalog-page .quick-view-project-help,
    .catalog-page .quick-view-project-status {
      margin: 0;
      color: #667283;
      font-size: 12px;
      font-weight: 650;
      line-height: 1.4;
    }

    .catalog-page .quick-view-project-status {
      color: #177245;
    }

    .catalog-page .quick-view-project-field {
      display: grid;
      gap: 5px;
      min-width: 0;
    }

    .catalog-page .quick-view-project-field > span {
      color: #4f5a68;
      font-size: 12px;
      font-weight: 800;
    }

    .catalog-page .quick-view-project-field input,
    .catalog-page .quick-view-project-field select {
      width: 100%;
      min-height: 42px;
      padding: 0 11px;
      color: #29323c;
      background: #fff;
      border: 1px solid #cfd6dc;
      border-radius: 6px;
      box-sizing: border-box;
      font: inherit;
      font-size: 14px;
    }

    .catalog-page .quick-view-project-field select:disabled {
      color: #778391;
      background: #f1f3f5;
    }

    .catalog-page .quick-view-project-submit {
      min-height: 42px;
      padding: 0 13px;
      color: #fff;
      background: #e1242c;
      border: 1px solid #e1242c;
      border-radius: 6px;
      font: inherit;
      font-size: 14px;
      font-weight: 850;
    }

    .catalog-page .quick-view-project-submit.is-secondary {
      color: #27323d;
      background: #fff;
      border-color: #485463;
    }

    .catalog-page .quick-view-project-submit:disabled {
      opacity: .55;
    }

    .catalog-page .quick-view-project-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #7d8895;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .catalog-page .quick-view-project-divider::before,
    .catalog-page .quick-view-project-divider::after {
      flex: 1;
      height: 1px;
      content: "";
      background: #dfe4e8;
    }

    .catalog-page .quick-view-project-manage {
      display: inline-flex;
      width: fit-content;
      color: #c8161e;
      font-size: 13px;
      font-weight: 800;
      text-decoration: none;
    }

    .catalog-page .quick-view-project-manage:hover {
      text-decoration: underline;
    }

    @media (max-width: 740px) {
      .catalog-page .quick-view-project-section {
        padding-top: 18px;
      }

      .catalog-page .quick-view-project-panel {
        gap: 10px;
        padding: 12px;
      }
    }
  </style>
</head>
<body class="catalog-page">
  <div id="siteHeaderMount"></div>

  <main class="results-page page">
    <nav id="breadcrumbs" class="results-breadcrumbs" aria-label="Breadcrumb"></nav>

    <header class="results-heading">
      <div>
        <h1 id="categoryTitle">Products</h1>
        <p id="catalogResultCount" class="results-count" aria-live="polite">Loading products...</p>
      </div>
      <div class="results-view-switcher" role="group" aria-label="Choose product result view">
        <button class="results-view-button is-active" type="button" data-catalog-view="table" aria-pressed="true" aria-label="Table result view"><span aria-hidden="true">☷</span></button>
        <button class="results-view-button" type="button" data-catalog-view="list" aria-pressed="false" aria-label="Grid result view"><span aria-hidden="true">⊞</span></button>
      </div>
    </header>

    <section class="results-controls" aria-label="Catalog controls">
      <button id="openCatalogFilters" class="results-control results-filter-button" type="button" aria-expanded="false">
        <span class="results-control-icon" aria-hidden="true">⌁</span>
        <span id="catalogFilterLabel">Filter</span>
      </button>

      <label class="results-control results-select-control" for="catalogPageSize">
        <span id="catalogPageSizeLabel">Show:</span>
        <select id="catalogPageSize" aria-label="Products per page"></select>
      </label>
    </section>

    <aside id="catalogFilters" class="catalog-filter-drawer" role="dialog" aria-modal="true" aria-labelledby="catalogFilterPanelTitle" aria-label="Filter and sort products" aria-hidden="true">
      <header class="catalog-filter-panel-heading">
        <h2 id="catalogFilterPanelTitle">Filter &amp; Sort</h2>
        <button class="catalog-filter-panel-close" type="button" data-close-catalog-filters aria-label="Close filter panel">×</button>
      </header>

      <div class="catalog-filter-panel-scroll">
        <div id="catalogFilterFields"></div>
      </div>

      <footer class="catalog-filter-panel-actions">
        <button id="resetCatalogFilters" class="catalog-filter-clear" type="button">Clear All</button>
        <button id="closeCatalogFilters" class="catalog-filter-done" type="button" data-close-catalog-filters>Close</button>
      </footer>
    </aside>
    <div id="catalogFilterBackdrop" class="catalog-filter-backdrop" aria-hidden="true"></div>

    <section class="results-table-region" aria-label="Product results">
      <div id="catalogTableWrap" class="results-table-wrap">
        <table class="results-table catalog-table">
          <thead id="catalogTableHead"></thead>
          <tbody id="catalogTableBody"></tbody>
        </table>
      </div>

      <div id="catalogList" class="results-card-grid" hidden></div>

      <div id="catalogPagination" class="results-pagination" hidden>
        <span id="catalogPaginationSummary">Showing 0 to 0 of 0 products</span>
        <div class="results-pagination-controls">
          <button id="catalogPreviousPage" class="results-page-button" type="button" aria-label="Previous page">‹</button>
          <span id="catalogPageIndicator">1</span>
          <button id="catalogNextPage" class="results-page-button" type="button" aria-label="Next page">›</button>
        </div>
      </div>

      <p id="catalogStatus" class="catalog-status" role="status"></p>
    </section>
  </main>

  <div id="quickViewModal" class="quick-view-modal" hidden>
    <div class="quick-view-backdrop" data-quick-close></div>
    <section class="quick-view-dialog" role="dialog" aria-modal="true" aria-labelledby="quickViewTitle" tabindex="-1">
      <button class="quick-view-close" type="button" data-quick-close aria-label="Close quick view">×</button>
      <div id="quickViewContent"></div>
    </section>
  </div>

  <footer class="site-footer"><div class="page"><strong>SteamSelector Beta</strong><span>Public test build</span></div></footer>

  <script src="categories.js?v=catalog-route-3"></script>
  <script src="catalog-category-route-guard.js?v=route-guard-1"></script>
  <script src="products.js"></script>
  <script src="catalog-core.js"></script>
  <script src="catalog-config.js?v=catalog-config-2"></script>
  <script src="quantity-stepper.js?v=qty-stepper-2"></script>
  <script src="site-header.js?v=header-contract-1"></script>
  <script src="category-global-search-exit.js?v=category-exit-1"></script>
  <script src="catalog-page.js?v=catalog-controller-3"></script>
  <script>
    (function () {
      "use strict";

      const content = document.getElementById("quickViewContent");
      if (!content) return;

      function currentProduct() {
        const core = window.SteamSelectorCore;
        const products = window.SteamSelectorProducts;
        const title = content.querySelector("#quickViewTitle");
        if (!core || !products || !title) return null;
        return products.getProductById(title.textContent.trim());
      }

      function selectedQuantity() {
        const quantityApi = window.SteamSelectorQuantity;
        const input = content.querySelector("#quickViewQty");
        if (quantityApi && typeof quantityApi.normalize === "function") {
          return quantityApi.normalize(input ? input.value : 1);
        }
        return Math.max(1, Math.floor(Number(input && input.value) || 1));
      }

      function projectOptions(selectedId) {
        const core = window.SteamSelectorCore;
        if (!core || !core.projects) return "<option value=\"\">Projects are unavailable</option>";
        const projects = core.projects.load();
        if (!projects.length) return "<option value=\"\">No saved projects yet</option>";

        return "<option value=\"\">Select a saved project</option>" + projects.map(function (project) {
          const selected = project.id === selectedId ? " selected" : "";
          return "<option value=\"" + core.escapeHtml(project.id) + "\"" + selected + ">"
            + core.escapeHtml(project.name) + "</option>";
        }).join("");
      }

      function refreshProjectPicker(preferredId) {
        const core = window.SteamSelectorCore;
        const picker = content.querySelector("[data-quick-view-project-select]");
        const addButton = content.querySelector("[data-quick-view-project-add]");
        if (!core || !core.projects || !picker) return;

        const selectedId = preferredId || picker.value;
        const projects = core.projects.load();
        picker.innerHTML = projectOptions(selectedId);
        picker.disabled = projects.length === 0;
        if (projects.some(function (project) { return project.id === selectedId; })) picker.value = selectedId;
        if (addButton) addButton.disabled = projects.length === 0;
      }

      function projectStatus(message) {
        const status = content.querySelector("[data-quick-view-project-status]");
        if (status) status.textContent = message;
      }

      function addProjectSection() {
        const core = window.SteamSelectorCore;
        const product = currentProduct();
        const details = content.querySelector(".quick-view-details");
        const actions = content.querySelector(".quick-view-actions");
        const modal = content.querySelector(".quick-view-redesign");
        if (!core || !core.projects || !product || !details || !actions || !modal || modal.dataset.quickViewProjectReady === "true") return;

        const panelSection = document.createElement("section");
        panelSection.id = "quickViewProjectPanel";
        panelSection.className = "quick-view-project-section";
        panelSection.hidden = true;
        panelSection.innerHTML = "<div class=\"quick-view-project-panel\">"
          + "<p class=\"quick-view-project-help\">Save the selected quantity to a named project list.</p>"
          + "<label class=\"quick-view-project-field\"><span>Saved project</span>"
          + "<select data-quick-view-project-select aria-label=\"Saved project\">" + projectOptions("") + "</select></label>"
          + "<button class=\"quick-view-project-submit\" type=\"button\" data-quick-view-project-add>Add to Selected Project</button>"
          + "<div class=\"quick-view-project-divider\"><span>or</span></div>"
          + "<label class=\"quick-view-project-field\"><span>New project name</span>"
          + "<input type=\"text\" maxlength=\"120\" placeholder=\"Boiler Room Upgrade\" data-quick-view-project-name /></label>"
          + "<label class=\"quick-view-project-field\"><span>Description <span class=\"muted\">(optional)</span></span>"
          + "<input type=\"text\" maxlength=\"600\" placeholder=\"Steam equipment selection\" data-quick-view-project-description /></label>"
          + "<button class=\"quick-view-project-submit is-secondary\" type=\"button\" data-quick-view-project-create>Create Project and Add Product</button>"
          + "<a class=\"quick-view-project-manage\" href=\"projects.html\">Manage Projects</a>"
          + "<p class=\"quick-view-project-status\" data-quick-view-project-status role=\"status\" aria-live=\"polite\"></p>"
          + "</div>";

        const documentSection = details.querySelector(".quick-view-documents-section");
        if (documentSection) details.insertBefore(panelSection, documentSection.nextSibling);
        else details.appendChild(panelSection);

        const projectButton = document.createElement("button");
        projectButton.className = "btn btn-secondary quick-view-project-toggle";
        projectButton.type = "button";
        projectButton.setAttribute("data-quick-view-project-toggle", "");
        projectButton.setAttribute("aria-expanded", "false");
        projectButton.setAttribute("aria-controls", "quickViewProjectPanel");
        projectButton.innerHTML = "<span aria-hidden=\"true\">＋</span><span>Add to Project</span>";

        const quoteButton = actions.querySelector("[data-quick-view-add]");
        if (quoteButton) actions.insertBefore(projectButton, quoteButton.nextSibling);
        else actions.prepend(projectButton);

        modal.dataset.quickViewProjectReady = "true";
        refreshProjectPicker();
      }

      const observer = new MutationObserver(addProjectSection);
      observer.observe(content, { childList: true, subtree: true });
      addProjectSection();

      document.addEventListener("click", function (event) {
        const toggle = event.target.closest("[data-quick-view-project-toggle]");
        if (toggle && content.contains(toggle)) {
          const panel = content.querySelector("#quickViewProjectPanel");
          if (!panel) return;
          const opening = panel.hidden;
          panel.hidden = !opening;
          toggle.setAttribute("aria-expanded", String(opening));
          if (opening) {
            refreshProjectPicker();
            window.requestAnimationFrame(function () {
              panel.scrollIntoView({ behavior: "smooth", block: "nearest" });
            });
          }
          return;
        }

        const addButton = event.target.closest("[data-quick-view-project-add]");
        if (addButton && content.contains(addButton)) {
          const core = window.SteamSelectorCore;
          const product = currentProduct();
          const picker = content.querySelector("[data-quick-view-project-select]");
          const projectId = picker ? picker.value : "";
          if (!core || !core.projects || !product || !projectId) {
            projectStatus("Choose a saved project or create a new project below.");
            return;
          }

          const project = core.projects.addItem(projectId, product, selectedQuantity());
          if (!project) {
            projectStatus("That project is no longer available. Refresh the project list and try again.");
            refreshProjectPicker();
            return;
          }

          const quantity = selectedQuantity();
          projectStatus(quantity === 1
            ? product.id + " was added to \"" + project.name + "\"."
            : quantity + " × " + product.id + " were added to \"" + project.name + "\".");
          refreshProjectPicker(project.id);
          return;
        }

        const createButton = event.target.closest("[data-quick-view-project-create]");
        if (createButton && content.contains(createButton)) {
          const core = window.SteamSelectorCore;
          const product = currentProduct();
          const nameInput = content.querySelector("[data-quick-view-project-name]");
          const descriptionInput = content.querySelector("[data-quick-view-project-description]");
          if (!core || !core.projects || !product || !nameInput) return;

          const project = core.projects.create({
            name: nameInput.value,
            description: descriptionInput ? descriptionInput.value : ""
          });
          if (!project) {
            projectStatus("Enter a new project name before creating it.");
            nameInput.focus();
            return;
          }

          const quantity = selectedQuantity();
          core.projects.addItem(project.id, product, quantity);
          nameInput.value = "";
          if (descriptionInput) descriptionInput.value = "";
          refreshProjectPicker(project.id);
          projectStatus("Created \"" + project.name + "\" and added " + product.id + ".");
        }
      });

      window.addEventListener("steamselector:projects-updated", function () {
        const panel = content.querySelector("#quickViewProjectPanel");
        if (panel && !panel.hidden) refreshProjectPicker();
      });
    })();
  </script>
</body>
</html>
